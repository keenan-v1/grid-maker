name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uvx ruff check .

      - name: Format check (ruff)
        run: uvx ruff format --check .

      - name: Build package
        run: uv build

      - name: Install tool and smoke test
        run: |
          uv tool install --python ${{ matrix.python-version }} .
          export PATH="$(uv tool dir --bin):$PATH"
          gridmaker -W 3 -H 3 -o ci_grid.png
          test -f ci_grid.png
          gridmaker -c -o ci_colors.png
          test -f ci_colors.png
